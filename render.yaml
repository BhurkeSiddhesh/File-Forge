services:
  - type: web
    name: file-forge
    env: docker # Correct key to tell Render to build from Dockerfile
    plan: starter # Starter plan is required for PaddleOCR memory
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FILE_FORGE_API_KEY
        generateValue: true
      - key: PORT
        value: "10000"
