services:
  - type: web
    name: file-forge
    runtime: image # Using 'image' with 'dockerContext' tells Render to use Docker
    plan: starter # Starter plan is required for PaddleOCR memory (free tier will crash)
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FILE_FORGE_API_KEY
        generateValue: true
      - key: PORT
        value: 10000
